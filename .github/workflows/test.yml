name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go mod tidy
        run: make tidy-check

      - name: Check generated files are committed
        run: make generate-check

      - name: Check Go imports and formatting
        run: make fmt-check

      - name: golangci-lint
        run: make lint

      - name: govulncheck
        run: make vuln

      - name: Test
        run: make test

      - name: Check coverage
        run: make coverage

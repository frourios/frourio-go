name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          gofmt -w main.go internal tests
          git diff --exit-code -- main.go internal tests

      - name: Generate fixtures
        run: go run . generate tests/apps/basic/api --openapi tests/apps/basic/openapi.json

      - name: Check generated files are committed
        run: git diff --exit-code -- tests/apps/basic

      - name: Test
        run: go test ./...

      - name: Check coverage
        run: |
          packages="$(go list ./... | grep -v '/tests/apps/' | tr '\n' ' ')"
          go test $packages -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')"
          awk -v total="$total" 'BEGIN { if (total < 95) exit 1 }'

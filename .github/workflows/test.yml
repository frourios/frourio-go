name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Generate fixtures
        run: |
          go generate ./tests/apps/basic
          go generate ./tests/apps/basic/openapiclient
          go generate ./tests/apps/middleware

      - name: Check generated files are committed
        run: git diff --exit-code -- tests/apps

      - name: Check Go imports and formatting
        run: |
          go tool goimports -w main.go internal tests
          git diff --exit-code -- main.go internal tests

      - name: golangci-lint
        run: go tool golangci-lint run ./...

      - name: govulncheck
        run: go tool govulncheck ./...

      - name: Test
        run: go test ./...

      - name: Check coverage
        run: |
          packages="$(go list ./... | grep -v '/tests/apps/' | tr '\n' ' ')"
          go test $packages -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')"
          awk -v total="$total" 'BEGIN { if (total < 95) exit 1 }'

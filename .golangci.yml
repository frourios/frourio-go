version: "2"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

linters:
  default: standard
  enable:
    - bodyclose
    - gosec
    - noctx
    - reassign
  settings:
    govet:
      enable:
        - fieldalignment
  exclusions:
    generated: disable
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: (^|/)frourio\.go$
        linters:
          - govet
      - path: (^|/)frourio_relay\.go$
        text: fieldalignment
        linters:
          - govet
      - path: tests/apps/basic/openapiclient/client\.gen\.go$
        linters:
          - bodyclose
          - govet
          - noctx

formatters:
  exclusions:
    generated: disable

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

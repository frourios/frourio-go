version: "2"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

linters:
  default: standard
  enable:
    - bodyclose
    - gosec
    - noctx
    - reassign
  exclusions:
    generated: disable
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  exclusions:
    generated: disable

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
